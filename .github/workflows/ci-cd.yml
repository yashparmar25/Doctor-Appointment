name: CI/CD Pipeline (Doctor App → Harbor → Timoni)

on:
  push:
    branches: [ "prod", "beta", "dev" ]

env:
  REGISTRY: 13.200.24.3
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push-update:
    runs-on: self-hosted

    steps:
      # 📥 Checkout App Repo
      - name: Checkout App Repo
        uses: actions/checkout@v4

      # 🌍 Set Environment Name
      - name: Set Environment Variables
        run: |
          echo "ENV_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      # 🔧 Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login to Harbor
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: 13.200.24.3
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # =========================
      # 🏗 BUILD & PUSH IMAGES
      # =========================

      # 🔹 FRONTEND
      - name: Build & Push Frontend
        id: frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: |
            13.200.24.3/doctor/doctor/doc-frotnend-${{ env.ENV_NAME }}:${{ env.IMAGE_TAG }}
            13.200.24.3/doctor/doctor/doc-frontend-${{ env.ENV_NAME }}:latest

      # 🔹 BACKEND
      - name: Build & Push Backend
        id: backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: |
            13.200.24.3/doctor/doctor/doc-backend-${{ env.ENV_NAME }}:${{ env.IMAGE_TAG }}
            13.200.24.3/doctor/doctor/doc-backend-${{ env.ENV_NAME }}:latest

      # 🔹 ADMIN
      - name: Build & Push Admin
        id: admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile.admin
          push: true
          tags: |
            13.200.24.3/doctor/doctor/doc-admin-${{ env.ENV_NAME }}:${{ env.IMAGE_TAG }}
            13.200.24.3/doctor/doctor/doc-admin-${{ env.ENV_NAME }}:latest

      # =========================
      # 📦 EXPORT DIGESTS
      # =========================

      - name: Export Digests
        run: |
          echo "FRONTEND_DIGEST=${{ steps.frontend.outputs.digest }}" >> $GITHUB_ENV
          echo "BACKEND_DIGEST=${{ steps.backend.outputs.digest }}" >> $GITHUB_ENV
          echo "ADMIN_DIGEST=${{ steps.admin.outputs.digest }}" >> $GITHUB_ENV

      # =========================
      # 📥 Checkout GitOps Repo
      # =========================

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar25/Doctor-Timoni
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # =========================
      # ✏️ UPDATE DIGESTS
      # =========================

      - name: Update Digest in Timoni Values
        run: |
          cd gitops-repo

          TARGET_FILE="values-${{ env.ENV_NAME }}.cue"

          echo "Updating $TARGET_FILE"

          # 🔹 FRONTEND
          sed -i "/frontend:/,/}/ s|repository:.*|repository: \"13.200.24.3/doctor/doctor/doc-frontend-${{ env.ENV_NAME }}\"|g" $TARGET_FILE
          sed -i "/frontend:/,/}/ s|digest:.*|digest: \"${FRONTEND_DIGEST}\"|g" $TARGET_FILE
          sed -i "/frontend:/,/}/ s|tag:.*|tag: \"\"|g" $TARGET_FILE

          # 🔹 BACKEND
          sed -i "/backend:/,/}/ s|repository:.*|repository: \"13.200.24.3/doctor/doctor/doc-backend-${{ env.ENV_NAME }}\"|g" $TARGET_FILE
          sed -i "/backend:/,/}/ s|digest:.*|digest: \"${BACKEND_DIGEST}\"|g" $TARGET_FILE
          sed -i "/backend:/,/}/ s|tag:.*|tag: \"\"|g" $TARGET_FILE

          # 🔹 ADMIN
          sed -i "/admin:/,/}/ s|repository:.*|repository: \"13.200.24.3/doctor/doctor/doc-admin-${{ env.ENV_NAME }}\"|g" $TARGET_FILE
          sed -i "/admin:/,/}/ s|digest:.*|digest: \"${ADMIN_DIGEST}\"|g" $TARGET_FILE
          sed -i "/admin:/,/}/ s|tag:.*|tag: \"\"|g" $TARGET_FILE

          echo "Preview:"
          cat $TARGET_FILE

      # =========================
      # 📤 COMMIT & PUSH
      # =========================

      - name: Commit & Push Changes
        run: |
          cd gitops-repo

          git config user.name "Yash Parmar"
          git config user.email "yashparmar2055@gmail.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(${{ env.ENV_NAME }}): doctor app digest update → ${{ env.IMAGE_TAG }}"
            git push
          fi
