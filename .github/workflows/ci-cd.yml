name: Build → Harbor → Update Timoni (Digest Based)

on:
  push:
    branches:
      - prod
      - beta
      - dev

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout App Repo
    - name: Checkout App Repo
      uses: actions/checkout@v4

    # 🔧 Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🔐 Login to Harbor
    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    # =========================
    # 🏗 BUILD & PUSH IMAGES
    # =========================

    # 🔹 FRONTEND
    - name: Build & Push Frontend
      id: frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.frontend
        push: true
        tags: ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }}

    # 🔹 BACKEND
    - name: Build & Push Backend
      id: backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.backend
        push: true
        tags: ${{ env.REGISTRY }}/backend:${{ env.IMAGE_TAG }}

    # 🔹 ADMIN
    - name: Build & Push Admin
      id: admin
      uses: docker/build-push-action@v5
      with:
        context: ./admin
        file: ./admin/Dockerfile.admin
        push: true
        tags: ${{ env.REGISTRY }}/admin:${{ env.IMAGE_TAG }}

    # =========================
    # 📦 GET DIGESTS (🔥 FIXED)
    # =========================

    - name: Export Digests
      run: |
        echo "FRONTEND_DIGEST=${{ steps.frontend.outputs.digest }}" >> $GITHUB_ENV
        echo "BACKEND_DIGEST=${{ steps.backend.outputs.digest }}" >> $GITHUB_ENV
        echo "ADMIN_DIGEST=${{ steps.admin.outputs.digest }}" >> $GITHUB_ENV

        echo "Frontend Digest: ${{ steps.frontend.outputs.digest }}"
        echo "Backend Digest: ${{ steps.backend.outputs.digest }}"
        echo "Admin Digest: ${{ steps.admin.outputs.digest }}"

    # =========================
    # 📥 CLONE TIMONI REPO
    # =========================

    - name: Clone Timoni Repo
      run: |
        git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/yashparmar25/Doctor-Timoni.git

    # =========================
    # 🧠 SELECT ENV FILE
    # =========================

    - name: Select values file
      id: envfile
      run: |
        BRANCH=${GITHUB_REF##*/}
        if [ "$BRANCH" = "prod" ]; then
          echo "FILE=values-prod.cue" >> $GITHUB_OUTPUT
        elif [ "$BRANCH" = "beta" ]; then
          echo "FILE=values-beta.cue" >> $GITHUB_OUTPUT
        else
          echo "FILE=values-dev.cue" >> $GITHUB_OUTPUT
        fi

    # =========================
    # ✏️ UPDATE DIGEST (SAFE)
    # =========================

    - name: Update CUE values
      run: |
        cd Doctor-Timoni
        FILE=${{ steps.envfile.outputs.FILE }}

        echo "Updating $FILE"

        # 🔹 FRONTEND
        sed -i "/frontend:/,/}/ s|repository: .*|repository: \"${{ env.REGISTRY }}/frontend\"|" $FILE
        sed -i "/frontend:/,/}/ s|digest: .*|digest: \"${FRONTEND_DIGEST}\"|" $FILE

        # 🔹 BACKEND
        sed -i "/backend:/,/}/ s|repository: .*|repository: \"${{ env.REGISTRY }}/backend\"|" $FILE
        sed -i "/backend:/,/}/ s|digest: .*|digest: \"${BACKEND_DIGEST}\"|" $FILE

        # 🔹 ADMIN
        sed -i "/admin:/,/}/ s|repository: .*|repository: \"${{ env.REGISTRY }}/admin\"|" $FILE
        sed -i "/admin:/,/}/ s|digest: .*|digest: \"${ADMIN_DIGEST}\"|" $FILE

        echo "Updated file preview:"
        cat $FILE

    # =========================
    # 📤 COMMIT & PUSH
    # =========================

    - name: Commit & Push Changes
      run: |
        cd Doctor-Timoni
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Update image digests for ${GITHUB_REF##*/} → ${IMAGE_TAG}" || echo "No changes"
        git push
