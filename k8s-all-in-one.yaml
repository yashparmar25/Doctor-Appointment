  VITE_BACKEND_URL: 'http://backend-service:4000'
---
# backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: yashparmar2055/doctor-backend:latest
        ports:
        - containerPort: 4000
        envFrom:
        - secretRef:
            name: backend-secret
---
# backend-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30001 
---
# admin-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: admin
        image: yashparmar2055/doctor-admin:latest
        ports:
        - containerPort: 80
---
# admin-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  type: NodePort
  selector:
    app: admin
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32001
---
# frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: yashparmar2055/doctor-frontned:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: frontend-secret
              key: VITE_RAZORPAY_KEY_ID
---
# frontend-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32000
