name: CI/CD Pipeline (Doctor App → Harbor → Timoni)

on:
  push:
    branches: [ "prod", "beta", "dev" ]

env:
  REGISTRY: 13.200.24.3
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================================
  # STAGE 1: Build & Push Images
  # ==========================================
  build-and-push:
    runs-on: self-hosted
    outputs:
      frontend_digest: ${{ steps.frontend.outputs.digest }}
      backend_digest: ${{ steps.backend.outputs.digest }}
      admin_digest: ${{ steps.admin.outputs.digest }}
      env_name: ${{ steps.vars.outputs.env_name }}
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Set Environment Name
        id: vars
        run: echo "env_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          config-inline: |
            [registry."13.200.24.3"]
              http = true
              insecure = true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push Frontend
        id: frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/doctor/${{ github.ref_name }}/doc-frontend-${{ github.ref_name }}:${{ env.IMAGE_TAG }}

      - name: Build & Push Backend
        id: backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/doctor/${{ github.ref_name }}/doc-backend-${{ github.ref_name }}:${{ env.IMAGE_TAG }}

      - name: Build & Push Admin
        id: admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile.admin
          push: true
          tags: ${{ env.REGISTRY }}/doctor/${{ github.ref_name }}/doc-admin-${{ github.ref_name }}:${{ env.IMAGE_TAG }}

  # ==========================================
  # STAGE 2: Update GitOps Configuration
  # ==========================================
  update-gitops:
    runs-on: self-hosted
    needs: build-and-push # Ensures this only runs if Stage 1 succeeds
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar25/Doctor-Timoni
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Update Timoni Values
        run: |
          cd gitops-repo
          ENV="${{ needs.build-and-push.outputs.env_name }}"
          TARGET_FILE="values-${ENV}.cue"
          
          FE_DIGEST="${{ needs.build-and-push.outputs.frontend_digest }}"
          BE_DIGEST="${{ needs.build-and-push.outputs.backend_digest }}"
          AD_DIGEST="${{ needs.build-and-push.outputs.admin_digest }}"

          echo "Updating $TARGET_FILE with digests..."

          # Frontend Update
          sed -i "/frontend:/,/}/ s|digest:.*|digest: \"${FE_DIGEST}\"|g" $TARGET_FILE
          # Backend Update
          sed -i "/backend:/,/}/ s|digest:.*|digest: \"${BE_DIGEST}\"|g" $TARGET_FILE
          # Admin Update
          sed -i "/admin:/,/}/ s|digest:.*|digest: \"${AD_DIGEST}\"|g" $TARGET_FILE

      - name: Commit & Push Changes
        run: |
          cd gitops-repo
          git config user.name "Yash Parmar CI"
          git config user.email "yashparmar2055@gmail.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(${{ github.ref_name }}): update image digests to ${{ env.IMAGE_TAG }}"
            git push
          fi
